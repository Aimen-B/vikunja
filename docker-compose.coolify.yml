services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        RELEASE_VERSION: ${VIKUNJA_RELEASE_VERSION:-coolify}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3456"
    environment:
      VIKUNJA_SERVICE_INTERFACE: :3456
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL:?https://vikunja.example.com}
      VIKUNJA_SERVICE_ROOTPATH: /app/vikunja
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:?set-a-long-random-secret}
      VIKUNJA_SERVICE_ENABLEREGISTRATION: ${VIKUNJA_SERVICE_ENABLEREGISTRATION:-false}
      VIKUNJA_SERVICE_TIMEZONE: ${VIKUNJA_SERVICE_TIMEZONE:-UTC}
      VIKUNJA_LOG_LEVEL: ${VIKUNJA_LOG_LEVEL:-INFO}
      VIKUNJA_FILES_TYPE: local
      VIKUNJA_FILES_BASEPATH: /app/vikunja/files
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: postgres:5432
      VIKUNJA_DATABASE_DATABASE: ${POSTGRES_DB:?vikunja}
      VIKUNJA_DATABASE_USER: ${POSTGRES_USER:?vikunja}
      VIKUNJA_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set-a-strong-password}
      VIKUNJA_DATABASE_SSLMODE: ${VIKUNJA_DATABASE_SSLMODE:-disable}
      VIKUNJA_DATABASE_MAXOPENCONNECTIONS: ${VIKUNJA_DATABASE_MAXOPENCONNECTIONS:-25}
      VIKUNJA_DATABASE_MAXIDLECONNECTIONS: ${VIKUNJA_DATABASE_MAXIDLECONNECTIONS:-25}
      VIKUNJA_DATABASE_MAXCONNECTIONLIFETIME: ${VIKUNJA_DATABASE_MAXCONNECTIONLIFETIME:-10000}
    volumes:
      - vikunja_files:/app/vikunja/files
    healthcheck:
      test: ["CMD", "/app/vikunja/vikunja", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?vikunja}
      POSTGRES_USER: ${POSTGRES_USER:?vikunja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-a-strong-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  vikunja_files:
